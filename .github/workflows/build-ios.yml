name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Create .env file
        working-directory: apps/mobile
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Install dependencies
        working-directory: apps/mobile
        run: npm install

      - name: Patch expo-image-picker for Xcode 16
        working-directory: apps/mobile
        run: |
          FILE="node_modules/expo-image-picker/ios/MediaHandler.swift"
          sed -i '' 's/asset?\.contentType/asset?.uniformTypeIdentifiers?.first.flatMap { UTType($0) }/g' "$FILE"
          sed -i '' 's/resource\.contentType/UTType(resource.uniformTypeIdentifier ?? "")/g' "$FILE"

      - name: Run Expo Prebuild
        working-directory: apps/mobile
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        working-directory: apps/mobile/ios
        run: |
          rm -rf Pods
          rm -f Podfile.lock
          pod install --repo-update

      - name: Build IPA (unsigned)
        working-directory: apps/mobile/ios
        run: |
          xcodebuild \
            -workspace mobile.xcworkspace \
            -scheme mobile \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build

      - name: Package IPA
        working-directory: apps/mobile/ios
        run: |
          mkdir -p output
          cp -r build/Build/Products/Release-iphoneos/mobile.app output/
          cd output
          mkdir Payload
          cp -r mobile.app Payload/
          zip -r app.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: apps/mobile/ios/output/app.ipa